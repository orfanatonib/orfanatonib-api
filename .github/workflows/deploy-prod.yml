name: Deploy Production Orfanato API

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-production-orfanato
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: prod-orfanato-nib-api
  ECS_SERVICE: prod-orfanato-nib-api
  ECS_CLUSTER: prod-cluster
  CONTAINER_NAME: orfanato-nib-api
  APP_PORT: 3001

jobs:
  deploy:
    name: Build, Push and Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # 🔐 Credenciais de DEPLOY (Conta onde está o ECS/ECR)
      - name: Configure AWS credentials (Deploy Account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ALB_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ALB_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f DockerFile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.ECS_SERVICE }} --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            ENVIRONMENT=production
            PORT=${{ env.APP_PORT }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            AWS_REGION=${{ env.AWS_REGION }}
            AWS_ACCESS_KEY_ID=${{ secrets.APP_AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.APP_AWS_SECRET_ACCESS_KEY }}
            AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}
            CONTACT_EMAIL_LOGO_URL=${{ secrets.CONTACT_EMAIL_LOGO_URL }}
            SES_DEFAULT_FROM=${{ secrets.SES_DEFAULT_FROM }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN }}
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_WHATSAPP_FROM=${{ secrets.TWILIO_WHATSAPP_FROM }}
            TWILIO_WHATSAPP_TO=${{ secrets.TWILIO_WHATSAPP_TO }}
            FEED_ORFANATO_PAGE_ID=${{ secrets.FEED_ORFANATO_PAGE_ID }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-steady-state: true
          force-new-deployment: true

      - name: Ensure service is running (scale up from 0)
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --desired-count 1 > /dev/null


      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "   ✅ Deploy ECS Producao Orfanato - OK!"
          echo "============================================"
          echo "  Cluster : ${{ env.ECS_CLUSTER }}"
          echo "  Servico : ${{ env.ECS_SERVICE }}"
          echo "  Imagem  : ${{ steps.build-image.outputs.image }}"
          echo "  URL     : http://orfanato-nib-api.rodolfo-silva.com"
