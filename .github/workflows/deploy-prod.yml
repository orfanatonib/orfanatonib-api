name: Deploy Production Orfanato API

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-production-orfanato
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_STACK_NAME: ecr-repository
  ECR_OUTPUT_KEY: Repository2Uri
  TARGET_GROUP_NAME: orfanato-nib-api-tg
  APP_NAME: orfanato-nib-api

jobs:
  build-and-deploy:
    name: Build, Push and Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      # Credenciais de deploy: acesso à conta-aws (ECR, SSM, ELB)
      # Secret names: ALB_AWS_ACCESS_KEY_ID / ALB_AWS_SECRET_ACCESS_KEY
      - name: Configure AWS credentials (conta-aws - deploy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ALB_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ALB_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR repository URI
        id: ecr-info
        run: |
          REPOSITORY_URI=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.ECR_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='${{ env.ECR_OUTPUT_KEY }}'].OutputValue" \
            --output text)
          if [ -z "$REPOSITORY_URI" ] || [ "$REPOSITORY_URI" = "None" ]; then
            echo "❌ Stack ${{ env.ECR_STACK_NAME }} ou output ${{ env.ECR_OUTPUT_KEY }} nao encontrado"
            exit 1
          fi
          echo "repository_uri=$REPOSITORY_URI" >> $GITHUB_OUTPUT
          echo "ECR Repository: $REPOSITORY_URI"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REPOSITORY: ${{ steps.ecr-info.outputs.repository_uri }}
        run: |
          docker build -f DockerFile \
            -t ${ECR_REPOSITORY}:latest \
            -t ${ECR_REPOSITORY}:${{ github.sha }} .

      - name: Push image to ECR
        env:
          ECR_REPOSITORY: ${{ steps.ecr-info.outputs.repository_uri }}
        run: |
          docker push ${ECR_REPOSITORY}:latest
          docker push ${ECR_REPOSITORY}:${{ github.sha }}
          echo "✅ Images pushed"

      - name: Get EC2 instance from target group
        id: ec2-info
        run: |
          TG_ARN=$(aws elbv2 describe-target-groups \
            --names ${{ env.TARGET_GROUP_NAME }} \
            --query 'TargetGroups[0].TargetGroupArn' \
            --output text)
          if [ -z "$TG_ARN" ] || [ "$TG_ARN" = "None" ]; then
            echo "❌ Target group ${{ env.TARGET_GROUP_NAME }} nao encontrado"
            exit 1
          fi
          INSTANCE_ID=$(aws elbv2 describe-target-health \
            --target-group-arn "$TG_ARN" \
            --query 'TargetHealthDescriptions[0].Target.Id' \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "❌ Nenhum target no target group ${{ env.TARGET_GROUP_NAME }}"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Instance ID: $INSTANCE_ID"

      - name: Create prod.env for deployment
        run: |
          cat > /tmp/prod.env << 'EOF'
          ENVIRONMENT=prod
          PORT=3000
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          AWS_REGION=${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID=${{ secrets.APP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.APP_AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}
          CONTACT_EMAIL_LOGO_URL=${{ secrets.CONTACT_EMAIL_LOGO_URL }}
          SES_DEFAULT_FROM=${{ secrets.SES_DEFAULT_FROM }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN }}
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM=${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO=${{ secrets.TWILIO_WHATSAPP_TO }}
          FEED_ORFANATO_PAGE_ID=${{ secrets.FEED_ORFANATO_PAGE_ID }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          EOF

      - name: Deploy to EC2 via SSM
        env:
          INSTANCE_ID: ${{ steps.ec2-info.outputs.instance_id }}
          ECR_REPOSITORY: ${{ steps.ecr-info.outputs.repository_uri }}
        run: |
          ENV_B64=$(base64 -w0 /tmp/prod.env)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_REPOSITORY}',
              'mkdir -p /opt/${{ env.APP_NAME }}/env',
              'echo ${ENV_B64} | base64 -d > /opt/${{ env.APP_NAME }}/env/prod.env',
              'docker stop ${{ env.APP_NAME }} || true',
              'docker rm ${{ env.APP_NAME }} || true',
              'docker pull ${ECR_REPOSITORY}:latest',
              'docker run -d --name ${{ env.APP_NAME }} --restart unless-stopped -p 3000:3000 --env-file /opt/${{ env.APP_NAME }}/env/prod.env ${ECR_REPOSITORY}:latest',
              'sleep 5',
              'docker ps | grep ${{ env.APP_NAME }}',
              'curl -sf http://localhost:3000/health || (echo \"health check falhou\" && exit 1)',
              'docker image prune -af --filter \"until=24h\" || true'
            ]" \
            --output text --query 'Command.CommandId')

          echo "SSM Command ID: $COMMAND_ID"

          MAX_ATTEMPTS=40
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Aguardando... $ATTEMPT/$MAX_ATTEMPTS - Status: $STATUS"
            sleep 5
          done

          STDOUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text)
          STDERR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text)

          echo "Status final: $STATUS"
          echo "--- STDOUT ---"
          echo "$STDOUT"
          if [ -n "$STDERR" ] && [ "$STDERR" != "None" ]; then
            echo "--- STDERR ---"
            echo "$STDERR"
          fi

          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deploy falhou!"
            exit 1
          fi

      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "   ✅ Deploy Producao Orfanato - Concluido!"
          echo "============================================"
          echo "  App     : ${{ env.APP_NAME }}"
          echo "  Instancia: ${{ steps.ec2-info.outputs.instance_id }}"
          echo "  Imagem  : ${{ steps.ecr-info.outputs.repository_uri }}:latest"
          echo "  Commit  : ${{ github.sha }}"
          echo "  URL     : https://api.orfanatonib.com"
          echo ""
          echo "  Health: curl https://api.orfanatonib.com/health"
