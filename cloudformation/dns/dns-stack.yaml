AWSTemplateFormatVersion: '2010-09-09'
Description: 'DNS Route53 - Aponta web request para ALB na conta de infraestrutura (conta-aws)'

Parameters:
  HostedZoneId:
    Type: String
    Description: ID da Hosted Zone do dominio orfanatonib.com

  DomainName:
    Type: String
    Default: api.orfanatonib.com
    Description: Subdominio a ser criado

  AlbDnsName:
    Type: String
    Description: DNS Name do ALB na outra conta (conta-aws)

  AlbHostedZoneId:
    Type: String
    Description: Hosted Zone ID do ALB na outra conta (conta-aws)

Resources:
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !Ref AlbDnsName
        HostedZoneId: !Ref AlbHostedZoneId
        EvaluateTargetHealth: true

Outputs:
  DomainName:
    Value: !Ref DomainName
    Description: Dominio configurado para orfanato-aws

  RecordSetId:
    Value: !Ref DNSRecord
    Description: ID do Record Set
